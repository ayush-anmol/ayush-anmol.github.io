<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 360" font-family="Consolas, ui-monospace, monospace">
  <rect width="800" height="360" rx="12" fill="#FAF6ED" stroke="#E7E5E4"/>
  <text x="40" y="42" font-size="16" font-weight="700" fill="#1C1917">Every pattern is a grid — your job is a formula in (i, j)</text>

  <!-- column labels -->
  <g font-size="11" fill="#78716C" text-anchor="middle">
    <text x="120" y="78">j=1</text>
    <text x="160" y="78">j=2</text>
    <text x="200" y="78">j=3</text>
    <text x="240" y="78">j=4</text>
    <text x="280" y="78">j=5</text>
  </g>
  <!-- row labels -->
  <g font-size="11" fill="#78716C" text-anchor="end">
    <text x="92" y="115">i=1</text>
    <text x="92" y="155">i=2</text>
    <text x="92" y="195">i=3</text>
    <text x="92" y="235">i=4</text>
    <text x="92" y="275">i=5</text>
  </g>

  <!-- empty cells (j > i) -->
  <g fill="#FFFFFF" stroke="#D6D3D1" stroke-dasharray="3 3">
    <rect x="140" y="90" width="40" height="40"/>
    <rect x="180" y="90" width="40" height="40"/>
    <rect x="220" y="90" width="40" height="40"/>
    <rect x="260" y="90" width="40" height="40"/>
    <rect x="180" y="130" width="40" height="40"/>
    <rect x="220" y="130" width="40" height="40"/>
    <rect x="260" y="130" width="40" height="40"/>
    <rect x="220" y="170" width="40" height="40"/>
    <rect x="260" y="170" width="40" height="40"/>
    <rect x="260" y="210" width="40" height="40"/>
  </g>

  <!-- filled cells (j <= i) -->
  <g fill="#D1FAE5" stroke="#047857">
    <rect x="100" y="90" width="40" height="40"/>
    <rect x="100" y="130" width="40" height="40"/>
    <rect x="140" y="130" width="40" height="40"/>
    <rect x="100" y="170" width="40" height="40"/>
    <rect x="140" y="170" width="40" height="40"/>
    <rect x="180" y="170" width="40" height="40"/>
    <rect x="100" y="210" width="40" height="40"/>
    <rect x="140" y="210" width="40" height="40"/>
    <rect x="180" y="210" width="40" height="40"/>
    <rect x="220" y="210" width="40" height="40"/>
    <rect x="100" y="250" width="40" height="40"/>
    <rect x="140" y="250" width="40" height="40"/>
    <rect x="180" y="250" width="40" height="40"/>
    <rect x="220" y="250" width="40" height="40"/>
    <rect x="260" y="250" width="40" height="40"/>
  </g>
  <!-- stars -->
  <g font-size="18" fill="#065F46" text-anchor="middle">
    <text x="120" y="122">*</text>
    <text x="120" y="162">*</text><text x="160" y="162">*</text>
    <text x="120" y="202">*</text><text x="160" y="202">*</text><text x="200" y="202">*</text>
    <text x="120" y="242">*</text><text x="160" y="242">*</text><text x="200" y="242">*</text><text x="240" y="242">*</text>
    <text x="120" y="282">*</text><text x="160" y="282">*</text><text x="200" y="282">*</text><text x="240" y="282">*</text><text x="280" y="282">*</text>
  </g>

  <!-- annotations -->
  <g>
    <text x="380" y="120" font-size="13" font-weight="700" fill="#1C1917">outer loop picks the row i</text>
    <text x="380" y="141" font-size="12" fill="#57534E">runs 1 … n, top to bottom</text>

    <text x="380" y="184" font-size="13" font-weight="700" fill="#1C1917">inner loop walks the columns j</text>
    <text x="380" y="205" font-size="12" fill="#57534E">how many? here: j runs 1 … i</text>

    <text x="380" y="248" font-size="13" font-weight="700" fill="#047857">row i gets exactly i stars</text>
    <text x="380" y="269" font-size="12" fill="#57534E">the whole problem is finding that formula</text>
  </g>

  <text x="200" y="322" font-size="11" text-anchor="middle" fill="#78716C">pyramid, n = 5</text>
</svg>
