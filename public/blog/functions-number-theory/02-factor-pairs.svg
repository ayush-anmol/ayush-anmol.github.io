<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 330" font-family="Consolas, ui-monospace, monospace">
  <rect width="800" height="330" rx="12" fill="#FAF6ED" stroke="#E7E5E4"/>
  <text x="40" y="42" font-size="16" font-weight="700" fill="#1C1917">Factors come in pairs — search only up to √n</text>

  <text x="370" y="92" font-size="12" text-anchor="middle" fill="#57534E">every arc multiplies to 36</text>

  <!-- pair arcs -->
  <g fill="none" stroke="#57534E" stroke-width="1.2">
    <path d="M 90 196 Q 370 96 650 196"/>
    <path d="M 160 196 Q 370 116 580 196"/>
    <path d="M 230 196 Q 370 136 510 196"/>
    <path d="M 300 196 Q 370 156 440 196"/>
  </g>

  <!-- tested factors (i <= sqrt(n)) -->
  <g>
    <rect x="68" y="200" width="44" height="36" rx="6" fill="#D1FAE5" stroke="#047857"/>
    <rect x="138" y="200" width="44" height="36" rx="6" fill="#D1FAE5" stroke="#047857"/>
    <rect x="208" y="200" width="44" height="36" rx="6" fill="#D1FAE5" stroke="#047857"/>
    <rect x="278" y="200" width="44" height="36" rx="6" fill="#D1FAE5" stroke="#047857"/>
    <rect x="348" y="200" width="44" height="36" rx="6" fill="#D1FAE5" stroke="#047857"/>
  </g>
  <!-- free partners (n / i) -->
  <g>
    <rect x="418" y="200" width="44" height="36" rx="6" fill="#DBEAFE" stroke="#1D4ED8"/>
    <rect x="488" y="200" width="44" height="36" rx="6" fill="#DBEAFE" stroke="#1D4ED8"/>
    <rect x="558" y="200" width="44" height="36" rx="6" fill="#DBEAFE" stroke="#1D4ED8"/>
    <rect x="628" y="200" width="44" height="36" rx="6" fill="#DBEAFE" stroke="#1D4ED8"/>
  </g>
  <g font-size="13" font-weight="700" text-anchor="middle">
    <text x="90" y="223" fill="#065F46">1</text>
    <text x="160" y="223" fill="#065F46">2</text>
    <text x="230" y="223" fill="#065F46">3</text>
    <text x="300" y="223" fill="#065F46">4</text>
    <text x="370" y="223" fill="#065F46">6</text>
    <text x="440" y="223" fill="#1E40AF">9</text>
    <text x="510" y="223" fill="#1E40AF">12</text>
    <text x="580" y="223" fill="#1E40AF">18</text>
    <text x="650" y="223" fill="#1E40AF">36</text>
  </g>

  <text x="230" y="268" font-size="11" text-anchor="middle" fill="#047857">you test these: i ≤ √36</text>
  <text x="545" y="268" font-size="11" text-anchor="middle" fill="#1D4ED8">partners come free: 36 ÷ i</text>
  <text x="370" y="298" font-size="11" text-anchor="middle" fill="#57534E">6 = √36 pairs with itself — record it once</text>
</svg>
