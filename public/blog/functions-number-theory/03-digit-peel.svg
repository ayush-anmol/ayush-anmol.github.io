<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 330" font-family="Consolas, ui-monospace, monospace">
  <rect width="800" height="330" rx="12" fill="#FAF6ED" stroke="#E7E5E4"/>
  <text x="40" y="42" font-size="16" font-weight="700" fill="#1C1917">Peel digits: n mod 10 reads, n ÷ 10 removes</text>

  <!-- column headers -->
  <text x="200" y="76" font-size="10" text-anchor="end" fill="#78716C">n</text>
  <text x="275" y="76" font-size="10" text-anchor="middle" fill="#78716C">n mod 10</text>

  <!-- steps -->
  <g font-size="13" text-anchor="end" fill="#1C1917">
    <text x="200" y="100">40230</text>
    <text x="200" y="134">4023</text>
    <text x="200" y="168">402</text>
    <text x="200" y="202">40</text>
    <text x="200" y="236">4</text>
  </g>
  <g stroke="#57534E" stroke-width="1.2" marker-end="url(#arrDp)">
    <line x1="215" y1="96" x2="252" y2="96"/>
    <line x1="215" y1="130" x2="252" y2="130"/>
    <line x1="215" y1="164" x2="252" y2="164"/>
    <line x1="215" y1="198" x2="252" y2="198"/>
    <line x1="215" y1="232" x2="252" y2="232"/>
  </g>

  <!-- digit chips: zeros highlighted -->
  <rect x="260" y="82" width="30" height="26" rx="6" fill="#FEF3C7" stroke="#B45309"/>
  <rect x="260" y="116" width="30" height="26" rx="6" fill="#FFFFFF" stroke="#D6D3D1"/>
  <rect x="260" y="150" width="30" height="26" rx="6" fill="#FFFFFF" stroke="#D6D3D1"/>
  <rect x="260" y="184" width="30" height="26" rx="6" fill="#FEF3C7" stroke="#B45309"/>
  <rect x="260" y="218" width="30" height="26" rx="6" fill="#FFFFFF" stroke="#D6D3D1"/>
  <g font-size="13" font-weight="700" text-anchor="middle">
    <text x="275" y="100" fill="#92400E">0</text>
    <text x="275" y="134" fill="#1C1917">3</text>
    <text x="275" y="168" fill="#1C1917">2</text>
    <text x="275" y="202" fill="#92400E">0</text>
    <text x="275" y="236" fill="#1C1917">4</text>
  </g>

  <g font-size="11">
    <text x="310" y="100" fill="#B45309">zero → count = 1</text>
    <text x="310" y="134" fill="#78716C">ignore</text>
    <text x="310" y="168" fill="#78716C">ignore</text>
    <text x="310" y="202" fill="#B45309">zero → count = 2</text>
    <text x="310" y="236" fill="#78716C">ignore</text>
  </g>

  <text x="60" y="270" font-size="12" fill="#57534E">4 ÷ 10 = 0 → loop ends; answer: 2 zeros</text>

  <!-- pseudocode box -->
  <rect x="520" y="92" width="240" height="150" rx="8" fill="#FFFFFF" stroke="#E7E5E4"/>
  <g font-size="13" fill="#1C1917">
    <text x="540" y="122">if n = 0: return 1</text>
    <text x="540" y="146">while n &gt; 0:</text>
    <text x="540" y="170">  if n mod 10 = 0:</text>
    <text x="540" y="194">    count = count + 1</text>
    <text x="540" y="218">  n = n ÷ 10</text>
  </g>
  <text x="640" y="266" font-size="11" text-anchor="middle" fill="#B45309">the n = 0 guard is the interview</text>

  <defs>
    <marker id="arrDp" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#57534E"/>
    </marker>
  </defs>
</svg>
