<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 360" font-family="Consolas, ui-monospace, monospace">
  <rect width="800" height="360" rx="12" fill="#FAF6ED" stroke="#E7E5E4"/>
  <text x="40" y="42" font-size="16" font-weight="700" fill="#1C1917">Reading one word at a time vs. all at once</text>

  <!-- left panel: RNN -->
  <rect x="40" y="66" width="350" height="248" rx="10" fill="#fff" stroke="#57534E"/>
  <text x="215" y="92" font-size="13" text-anchor="middle" fill="#1C1917" font-weight="700">RNN — sequential memory</text>

  <text x="215" y="130" font-size="11" text-anchor="middle" fill="#78716C">memory fades as it reads →</text>

  <g font-size="11" text-anchor="middle">
    <rect x="58" y="150" width="50" height="26" rx="6" fill="#F5F5F4" stroke="#78716C" opacity="0.35"/>
    <text x="83" y="167" fill="#1C1917" opacity="0.35">The</text>
    <rect x="124" y="150" width="50" height="26" rx="6" fill="#F5F5F4" stroke="#78716C" opacity="0.5"/>
    <text x="149" y="167" fill="#1C1917" opacity="0.5">cat,</text>
    <rect x="190" y="150" width="50" height="26" rx="6" fill="#F5F5F4" stroke="#78716C" opacity="0.65"/>
    <text x="215" y="167" fill="#1C1917" opacity="0.65">...</text>
    <rect x="256" y="150" width="50" height="26" rx="6" fill="#F5F5F4" stroke="#78716C" opacity="0.85"/>
    <text x="281" y="167" fill="#1C1917" opacity="0.85">was</text>
    <rect x="322" y="150" width="50" height="26" rx="6" fill="#F5F5F4" stroke="#78716C"/>
    <text x="347" y="167" fill="#1C1917">happy</text>
  </g>
  <g stroke="#78716C" marker-end="url(#arrN)">
    <line x1="109" y1="163" x2="121" y2="163"/>
    <line x1="175" y1="163" x2="187" y2="163"/>
    <line x1="241" y1="163" x2="253" y2="163"/>
    <line x1="307" y1="163" x2="319" y2="163"/>
  </g>

  <g font-size="11" text-anchor="middle" fill="#B91C1C">
    <text x="215" y="216">by "happy", "the cat" has faded —</text>
    <text x="215" y="234">and every step waits for the last</text>
  </g>

  <text x="215" y="340" font-size="11" text-anchor="middle" fill="#78716C">slow + forgetful</text>

  <!-- right panel: attention -->
  <rect x="410" y="66" width="350" height="248" rx="10" fill="#ECFDF5" stroke="#047857" stroke-width="1.5"/>
  <text x="585" y="92" font-size="13" text-anchor="middle" fill="#065F46" font-weight="700">attention — everyone sees everyone</text>

  <text x="585" y="130" font-size="11" text-anchor="middle" fill="#57534E">"it" attends most strongly to "animal"</text>

  <!-- arcs from "it" to earlier tokens -->
  <g fill="none">
    <path d="M 718 238 Q 580 158, 447 238" stroke="#A8A29E" stroke-width="1" marker-end="url(#arrN)"/>
    <path d="M 718 238 Q 650 178, 582 238" stroke="#A8A29E" stroke-width="1" marker-end="url(#arrN)"/>
    <path d="M 718 238 Q 688 198, 658 238" stroke="#A8A29E" stroke-width="1" marker-end="url(#arrN)"/>
    <path d="M 718 238 Q 612 148, 507 238" stroke="#047857" stroke-width="2.5" marker-end="url(#arrNg)"/>
  </g>

  <g font-size="11" text-anchor="middle" fill="#1C1917">
    <text x="445" y="254">The</text>
    <text x="505" y="254" font-weight="700" fill="#047857">animal</text>
    <text x="580" y="254">street</text>
    <text x="655" y="254">because</text>
    <text x="718" y="254" font-weight="700">it</text>
  </g>

  <text x="585" y="290" font-size="11" text-anchor="middle" fill="#57534E">all connections computed in parallel</text>

  <text x="585" y="340" font-size="11" text-anchor="middle" fill="#78716C">parallel + long-range</text>

  <defs>
    <marker id="arrN" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 z" fill="#78716C"/>
    </marker>
    <marker id="arrNg" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 z" fill="#047857"/>
    </marker>
  </defs>
</svg>
