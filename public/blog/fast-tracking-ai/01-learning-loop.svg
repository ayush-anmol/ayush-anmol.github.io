<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" font-family="Consolas, ui-monospace, monospace">
  <rect width="800" height="300" rx="12" fill="#FAF6ED" stroke="#E7E5E4"/>
  <text x="40" y="42" font-size="16" font-weight="700" fill="#1C1917">Learning is a loop</text>

  <!-- boxes -->
  <g font-size="13" text-anchor="middle">
    <rect x="60" y="110" width="190" height="52" rx="8" fill="#D1FAE5" stroke="#047857"/>
    <text x="155" y="141" fill="#065F46" font-weight="700">try something</text>

    <rect x="305" y="110" width="190" height="52" rx="8" fill="#fff" stroke="#57534E"/>
    <text x="400" y="132" fill="#1C1917">see what happens</text>
    <text x="400" y="150" font-size="11" fill="#78716C">(feedback)</text>

    <rect x="550" y="110" width="190" height="52" rx="8" fill="#fff" stroke="#57534E"/>
    <text x="645" y="141" fill="#1C1917" font-weight="700">adjust</text>
  </g>

  <!-- forward arrows -->
  <g stroke="#57534E" stroke-width="1.5" marker-end="url(#arrL)">
    <line x1="252" y1="136" x2="301" y2="136"/>
    <line x1="497" y1="136" x2="546" y2="136"/>
  </g>

  <!-- loop back -->
  <path d="M 645 164 V 222 H 155 V 170" fill="none" stroke="#047857" stroke-width="1.5" marker-end="url(#arrLg)"/>
  <text x="400" y="245" font-size="12" text-anchor="middle" fill="#047857">repeat</text>

  <text x="400" y="278" font-size="12" text-anchor="middle" fill="#78716C">learning = adjusting yourself based on feedback</text>

  <defs>
    <marker id="arrL" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#57534E"/>
    </marker>
    <marker id="arrLg" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#047857"/>
    </marker>
  </defs>
</svg>
