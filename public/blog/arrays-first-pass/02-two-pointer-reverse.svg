<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" font-family="Consolas, ui-monospace, monospace">
  <rect width="800" height="320" rx="12" fill="#FAF6ED" stroke="#E7E5E4"/>
  <text x="40" y="42" font-size="16" font-weight="700" fill="#1C1917">Reverse in place: two pointers converge, swapping as they go</text>

  <!-- swap arcs -->
  <g fill="none" stroke="#57534E" stroke-width="1.3">
    <path d="M 166 116 Q 321 56 476 116" marker-start="url(#arrTprS)" marker-end="url(#arrTprE)"/>
    <path d="M 228 116 Q 321 76 414 116" marker-start="url(#arrTprS)" marker-end="url(#arrTprE)"/>
    <path d="M 290 116 Q 321 94 352 116" marker-start="url(#arrTprS)" marker-end="url(#arrTprE)"/>
  </g>

  <!-- array cells -->
  <g fill="#FFFFFF" stroke="#57534E">
    <rect x="140" y="120" width="52" height="44" rx="6"/>
    <rect x="202" y="120" width="52" height="44" rx="6"/>
    <rect x="264" y="120" width="52" height="44" rx="6"/>
    <rect x="326" y="120" width="52" height="44" rx="6"/>
    <rect x="388" y="120" width="52" height="44" rx="6"/>
    <rect x="450" y="120" width="52" height="44" rx="6"/>
  </g>
  <g font-size="15" font-weight="700" fill="#1C1917" text-anchor="middle">
    <text x="166" y="148">1</text>
    <text x="228" y="148">2</text>
    <text x="290" y="148">3</text>
    <text x="352" y="148">4</text>
    <text x="414" y="148">5</text>
    <text x="476" y="148">6</text>
  </g>

  <!-- pointers -->
  <g stroke-width="1.5">
    <line x1="166" y1="196" x2="166" y2="172" stroke="#047857" marker-end="url(#arrTprG)"/>
    <line x1="476" y1="196" x2="476" y2="172" stroke="#1D4ED8" marker-end="url(#arrTprB)"/>
  </g>
  <text x="166" y="216" font-size="13" font-weight="700" text-anchor="middle" fill="#047857">l →</text>
  <text x="476" y="216" font-size="13" font-weight="700" text-anchor="middle" fill="#1D4ED8">← r</text>

  <text x="400" y="258" font-size="12" text-anchor="middle" fill="#57534E">swap ends, step inward: 1↔6, 2↔5, 3↔4; stop when l ≥ r</text>
  <text x="400" y="286" font-size="11" text-anchor="middle" fill="#78716C">n ÷ 2 swaps, no second array</text>

  <defs>
    <marker id="arrTprE" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#57534E"/>
    </marker>
    <marker id="arrTprS" markerWidth="8" markerHeight="8" refX="1" refY="4" orient="auto-start-reverse">
      <path d="M0,0 L8,4 L0,8 z" fill="#57534E"/>
    </marker>
    <marker id="arrTprG" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#047857"/>
    </marker>
    <marker id="arrTprB" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#1D4ED8"/>
    </marker>
  </defs>
</svg>
