<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 340" font-family="Consolas, ui-monospace, monospace">
  <rect width="800" height="340" rx="12" fill="#FAF6ED" stroke="#E7E5E4"/>
  <text x="40" y="42" font-size="16" font-weight="700" fill="#1C1917">The k-sum ladder: every extra loop multiplies the work</text>

  <!-- panel 1: pairs -->
  <rect x="60" y="80" width="200" height="170" rx="8" fill="#FFFFFF" stroke="#E7E5E4"/>
  <text x="76" y="108" font-size="13" font-weight="700" fill="#1C1917">pairs: O(n²)</text>
  <g font-size="12" fill="#57534E">
    <text x="76" y="136">for i = 1…n:</text>
    <text x="96" y="158">for j = i+1…n:</text>
  </g>
  <text x="76" y="230" font-size="12" font-weight="700" fill="#047857">C(100,2) = 4,950</text>

  <!-- panel 2: triplets -->
  <rect x="300" y="80" width="200" height="170" rx="8" fill="#FFFFFF" stroke="#E7E5E4"/>
  <text x="316" y="108" font-size="13" font-weight="700" fill="#1C1917">triplets: O(n³)</text>
  <g font-size="12" fill="#57534E">
    <text x="316" y="136">for i = 1…n:</text>
    <text x="336" y="158">for j = i+1…n:</text>
    <text x="356" y="180">for k = j+1…n:</text>
  </g>
  <text x="316" y="230" font-size="12" font-weight="700" fill="#B45309">C(100,3) = 161,700</text>

  <!-- panel 3: quadruplets -->
  <rect x="540" y="80" width="200" height="170" rx="8" fill="#FFFFFF" stroke="#E7E5E4"/>
  <text x="556" y="108" font-size="13" font-weight="700" fill="#1C1917">quads: O(n⁴)</text>
  <g font-size="12" fill="#57534E">
    <text x="556" y="136">for i = 1…n:</text>
    <text x="576" y="158">for j = i+1…n:</text>
    <text x="596" y="180">for k = j+1…n:</text>
    <text x="616" y="202">for l = k+1…n:</text>
  </g>
  <text x="556" y="230" font-size="12" font-weight="700" fill="#B91C1C">C(100,4) ≈ 3.9 million</text>

  <!-- ladder arrows -->
  <g stroke="#57534E" stroke-width="1.5" marker-end="url(#arrKs)">
    <line x1="264" y1="165" x2="294" y2="165"/>
    <line x1="504" y1="165" x2="534" y2="165"/>
  </g>
  <text x="280" y="155" font-size="10" text-anchor="middle" fill="#57534E">×33</text>
  <text x="520" y="155" font-size="10" text-anchor="middle" fill="#57534E">×24</text>

  <text x="400" y="292" font-size="12" text-anchor="middle" fill="#57534E">each index starts one past the previous, giving combinations, not permutations: no pair counted twice</text>
  <text x="400" y="316" font-size="11" text-anchor="middle" fill="#78716C">counts shown for n = 100; the escape hatches (sorting + two pointers, hash maps) come later in the series</text>

  <defs>
    <marker id="arrKs" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#57534E"/>
    </marker>
  </defs>
</svg>
